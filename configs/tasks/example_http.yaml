task_id: "example_order_flow"
task_name: "示例-订单全流程构造"
task_type: "http_source"
schedule: "0 2 * * *"

pipeline:
  - step_id: "create_user"
    name: "创建测试用户"
    http:
      url: "https://httpbin.org/post"
      method: POST
      body_template: |
        {
          "username": "{{ faker.name }}",
          "email": "{{ faker.email }}"
        }
    extract:
      user_id: "$.json.username"

tag_mapping:
  user_id: "{{ context.user_id }}"
  order_id: "N/A"
  data_tag: "EXAMPLE_HTTP_DATA"

target_db:
  instance: "biz_db_01"
  database: "test_db"

task_id: "example_db_assertion"
task_name: "DB 断言示例任务"
task_type: "http_source"
schedule: "0 2 * * *"
enabled: true
target_db:
  instance: "tdc"
  database: "tdc"

execution:
  iterations: 1
  user_source: "faker"
  user_template: "{{ faker.user_name }}"

pipeline:
  - step_id: "create_order"
    name: "创建订单"
    http:
      url: "https://api.example.com/orders"
      method: "POST"
      body_template: "create_order.json"
      headers:
        Content-Type: "application/json"
    extract:
      orderNo: "data.orderNo"
    db_assertions:
      - instance: "user_db_master"
        database: "orders"
        mode: "table"
        table: "orders"
        where: 'order_no = "{{ context.get("orderNo") }}"'
        expected_rows: 1
        delay_ms: 200
        retry:
          max_attempts: 3
          delay: 1
          backoff: "exponential"
        fail_on_error: true

      - instance: "user_db_master"
        database: "orders"
        mode: "sql"
        sql: 'SELECT status FROM order_items WHERE order_no = "{{ context.get("orderNo") }}"'
        query_path: "status"
        expected_value: "PENDING"
        delay_ms: 200
        fail_on_error: true

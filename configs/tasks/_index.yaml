# 任务索引文件
# 用于集中管理所有任务配置

tasks:
  # 订单-支付流程
  order_payment_flow:
    file: "${CONFIG_DIR}/tasks/order_payment_flow.yaml"
    description: "创建订单并获取支付信息"

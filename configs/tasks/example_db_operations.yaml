task_id: "example_db_operations"
task_name: "DB UPDATE/DELETE 操作示例"
task_type: "http_source"
schedule: "0 3 * * *"
enabled: false

target_db:
  instance: "tdc"
  database: "tdc"

execution:
  iterations: 1
  user_source: "faker"

pipeline:
  - step_id: "create_order"
    name: "创建订单"
    http:
      url: "https://api.example.com/orders"
      method: POST
      body_template: "create_order.json"
    extract:
      orderNo: "data.orderNo"

    # 创建订单后更新状态（after_assertions 默认时机）
    db_operations:
      - type: "update"
        instance: "order_db"
        database: "orders"
        table: "order_status"
        set:
          status: "CREATED"
          created_at: "{{ now.isoformat() }}"
        where: 'order_no = "{{ context.get("orderNo") }}"'
        extract:
          updated_rows: "rowcount"

  - step_id: "cleanup_old_data"
    name: "清理旧数据"
    # 纯 DB 操作步骤（无 HTTP）
    db_operations:
      - type: "delete"
        instance: "log_db"
        mode: "sql"
        sql: 'DELETE FROM temp_logs WHERE created_at < DATE_SUB(NOW(), INTERVAL 7 DAY)'
        fail_on_error: false

  - step_id: "batch_update"
    name: "批量更新订单状态"
    http:
      url: "https://api.example.com/orders/batch"
      method: POST
      body_template: "batch_request.json"
    extract:
      orderIds: "data.orderIds"

    # 使用批量参数更新多个订单
    db_operations:
      - type: "update"
        instance: "order_db"
        table: "orders"
        set:
          status: "BATCH_PAID"
        where: 'order_id IN (:order_ids)'
        batch_params:
          order_ids: "orderIds"  # context.get("orderIds") 返回列表

  - step_id: "transfer_funds"
    name: "转账操作"
    http:
      url: "https://api.example.com/transfer"
      method: POST
      body_template: "transfer.json"

    # 事务包裹：扣款 + 入账 + 删除冻结记录
    db_operations:
      - transaction: true
        fail_on_error: true
        operations:
          - type: "update"
            instance: "account_db"
            table: "accounts"
            set:
              balance: "balance - {{ amount }}"
            where: 'user_id = "{{ from_user_id }}" AND balance >= {{ amount }}'

          - type: "update"
            instance: "account_db"
            table: "accounts"
            set:
              balance: "balance + {{ amount }}"
            where: 'user_id = "{{ to_user_id }}"'

          - type: "delete"
            instance: "account_db"
            table: "frozen_records"
            where: 'record_id = "{{ record_id }}"'

  - step_id: "conditional_cleanup"
    name: "条件清理"
    http:
      url: "https://api.example.com/check"
      method: GET
    extract:
      shouldCleanup: "data.shouldCleanup"

    # 根据条件执行清理（before_assertions 时机）
    db_operations:
      - type: "delete"
        timing: "before_assertions"
        instance: "temp_db"
        table: "temp_processing"
        where: 'created_at < DATE_SUB(NOW(), INTERVAL 1 DAY)'
        fail_on_error: false

  - step_id: "log_result"
    name: "记录处理结果"
    http:
      url: "https://api.example.com/process"
      method: POST
    extract:
      processId: "data.processId"

    # 在 extract 后记录日志（after_extract 时机）
    db_operations:
      - type: "update"
        timing: "after_extract"
        instance: "log_db"
        table: "processing_logs"
        set:
          result: "SUCCESS"
          processed_at: "{{ now.isoformat() }}"
        where: 'log_id = "{{ processId }}"'
